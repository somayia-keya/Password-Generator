<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #0f3460;
    --highlight: #e94560;
    --text: #f1f1f1;
    --muted: #9aa5b1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 20px;
    margin: 0 0 20px;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .output {
    display: flex;
    align-items: center;
    background: var(--accent);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    gap: 10px;
  }
  #password {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 17px;
    font-family: "SFMono-Regular", Consolas, Menlo, monospace;
    letter-spacing: 1px;
    outline: none;
    min-width: 0;
    overflow-x: auto;
  }
  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.2s;
  }
  .icon-btn:hover { color: var(--text); }
  .strength {
    font-size: 12px;
    margin: -12px 0 20px 4px;
    color: var(--muted);
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 14px;
  }
  input[type=range] {
    width: 60%;
    accent-color: var(--highlight);
  }
  .toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 14px;
  }
  .switch {
    position: relative;
    width: 42px;
    height: 24px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #333;
    transition: .3s;
    border-radius: 24px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 18px; width: 18px;
    left: 3px; bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
  }
  input:checked + .slider { background-color: var(--highlight); }
  input:checked + .slider:before { transform: translateX(18px); }
  button.generate {
    width: 100%;
    margin-top: 22px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--highlight);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button.generate:hover { opacity: 0.9; }
  .copied {
    color: #4ade80 !important;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Password Generator</h1>

  <div class="output">
    <input type="text" id="password" readonly>
    <button class="icon-btn" id="copyBtn" title="Copy">📋</button>
  </div>
  <div class="strength" id="strength"></div>

  <div class="row">
    <span>Length</span>
    <input type="range" id="length" min="4" max="64" value="16">
    <span id="lengthVal">16</span>
  </div>

  <div class="toggle">
    <span>Uppercase (A-Z)</span>
    <label class="switch"><input type="checkbox" id="upper" checked><span class="slider"></span></label>
  </div>
  <div class="toggle">
    <span>Lowercase (a-z)</span>
    <label class="switch"><input type="checkbox" id="lower" checked><span class="slider"></span></label>
  </div>
  <div class="toggle">
    <span>Numbers (0-9)</span>
    <label class="switch"><input type="checkbox" id="numbers" checked><span class="slider"></span></label>
  </div>
  <div class="toggle">
    <span>Symbols (!@#$...)</span>
    <label class="switch"><input type="checkbox" id="symbols" checked><span class="slider"></span></label>
  </div>
  <div class="toggle" style="border-bottom:none;">
    <span>Exclude ambiguous (l1IO0)</span>
    <label class="switch"><input type="checkbox" id="ambiguous"><span class="slider"></span></label>
  </div>

  <button class="generate" id="genBtn">Generate Password</button>
</div>

<script>
const lengthInput = document.getElementById('length');
const lengthVal = document.getElementById('lengthVal');
const passwordEl = document.getElementById('password');
const strengthEl = document.getElementById('strength');
const copyBtn = document.getElementById('copyBtn');
const genBtn = document.getElementById('genBtn');

const upperEl = document.getElementById('upper');
const lowerEl = document.getElementById('lower');
const numbersEl = document.getElementById('numbers');
const symbolsEl = document.getElementById('symbols');
const ambiguousEl = document.getElementById('ambiguous');

const SETS = {
  upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
  lower: "abcdefghijklmnopqrstuvwxyz",
  numbers: "0123456789",
  symbols: "!@#$%^&*()_+-=[]{}|;:,.<>?/~"
};
const AMBIGUOUS = "l1IO0";

function secureRandomInt(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function generatePassword() {
  let pool = "";
  if (upperEl.checked) pool += SETS.upper;
  if (lowerEl.checked) pool += SETS.lower;
  if (numbersEl.checked) pool += SETS.numbers;
  if (symbolsEl.checked) pool += SETS.symbols;

  if (ambiguousEl.checked) {
    pool = pool.split('').filter(c => !AMBIGUOUS.includes(c)).join('');
  }

  if (!pool) {
    passwordEl.value = "Select at least one option";
    strengthEl.textContent = "";
    return;
  }

  const length = parseInt(lengthInput.value, 10);
  let result = "";
  for (let i = 0; i < length; i++) {
    result += pool[secureRandomInt(pool.length)];
  }
  passwordEl.value = result;
  updateStrength(pool.length, length);
}

function updateStrength(poolSize, length) {
  const entropy = Math.log2(poolSize) * length;
  let label, color;
  if (entropy < 40) { label = "Weak"; color = "#f87171"; }
  else if (entropy < 60) { label = "Fair"; color = "#facc15"; }
  else if (entropy < 80) { label = "Strong"; color = "#4ade80"; }
  else { label = "Very strong"; color = "#22c55e"; }
  strengthEl.innerHTML = `Entropy: ~${Math.round(entropy)} bits · <span style="color:${color}">${label}</span>`;
}

lengthInput.addEventListener('input', () => {
  lengthVal.textContent = lengthInput.value;
  generatePassword();
});
[upperEl, lowerEl, numbersEl, symbolsEl, ambiguousEl].forEach(el =>
  el.addEventListener('change', generatePassword)
);
genBtn.addEventListener('click', generatePassword);

copyBtn.addEventListener('click', () => {
  if (!passwordEl.value || passwordEl.value.includes(" ")) return;
  navigator.clipboard.writeText(passwordEl.value).then(() => {
    copyBtn.textContent = "✅";
    setTimeout(() => copyBtn.textContent = "📋", 1200);
  });
});

generatePassword();
</script>
</body>
</html>
